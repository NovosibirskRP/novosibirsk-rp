<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novosibirsk RP | Официальный сайт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.nav-link.active { color: #22d3ee !important; background-color: #0f172a !important; }</style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center space-x-3 cursor-pointer" onclick="switchTab('main')">
                    <img src="photo_2026-05-26_23-01-05.jpg" class="w-10 h-10 rounded-xl object-cover border border-slate-700 shadow-md">
                    <span class="text-2xl font-black text-white">NOVOSIBIRSK <span class="text-cyan-400">RP</span></span>
                </div>
                <div class="flex space-x-2">
                    <button onclick="switchTab('main')" class="nav-link active px-4 py-2 rounded-lg text-sm font-medium">Главная</button>
                    <button onclick="switchTab('news')" class="nav-link px-4 py-2 rounded-lg text-sm font-medium">Новости</button>
                    <button onclick="switchTab('profile')" class="nav-link px-4 py-2 rounded-lg text-sm font-medium">Профиль</button>
                </div>
                <div id="auth-zone">
                    <button onclick="openModal()" class="bg-cyan-500 text-slate-950 font-bold px-6 py-2.5 rounded-xl text-sm">Войти</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-10">
        <div id="tab-profile" class="tab-content space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl h-fit">
                    <h3 class="text-xl font-bold text-white mb-4">Безопасность</h3>
                    <input type="password" id="profile-new-password" placeholder="Новый пароль" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 mb-3 text-white">
                    <button onclick="changeOwnPassword()" class="w-full bg-cyan-500 text-slate-950 font-bold py-3 rounded-xl">Обновить пароль</button>
                </div>

                <div id="management-panel" class="lg:col-span-2 bg-slate-900 border border-amber-500/30 p-6 rounded-2xl">
                    <h3 class="text-amber-400 font-bold text-lg mb-4">🗄️ База Данных Пользователей</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-white">
                            <thead>
                                <tr class="border-b border-slate-800 text-slate-400">
                                    <th class="py-3">Ник</th>
                                    <th class="py-3">Роль</th>
                                    <th class="py-3">Действие</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
