<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Novosibirsk RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <nav class="p-6 border-b border-slate-800 flex justify-between">
        <h1 class="text-2xl font-black">NOVOSIBIRSK RP</h1>
        <button onclick="handleLogout()" class="text-slate-400">Выйти</button>
    </nav>

    <main class="p-6">
        <div id="auth-box" class="bg-slate-900 p-6 rounded-xl max-w-sm mx-auto">
            <form onsubmit="handleAuthLogin(event)" class="space-y-4">
                <input type="text" id="login-username" placeholder="Никнейм" class="w-full bg-slate-800 p-3 rounded-lg">
                <input type="password" id="login-password" placeholder="Пароль" class="w-full bg-slate-800 p-3 rounded-lg">
                <button type="submit" class="w-full bg-cyan-500 py-3 rounded-lg font-bold">Войти</button>
            </form>
        </div>

        <div id="management-panel" class="hidden mt-10 max-w-2xl mx-auto bg-slate-900 p-6 rounded-xl">
            <h2 class="text-xl font-bold mb-4">База игроков</h2>
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 text-sm">
                        <th class="p-3">Ник</th>
                        <th class="p-3">Роль</th>
                        <th class="p-3">Действие</th>
                    </tr>
                </thead>
                <tbody id="users-table-body"></tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
