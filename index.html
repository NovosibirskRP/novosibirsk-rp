<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novosibirsk RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.hidden { display: none !important; } .active { color: #22d3ee; }</style>
</head>
<body class="bg-slate-950 text-white">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-2xl font-black cursor-pointer" onclick="switchTab('main')">NOVOSIBIRSK RP</h1>
        <div class="flex gap-6 items-center">
            <button onclick="switchTab('main')" id="nav-main" class="nav-link">Главная</button>
            <button onclick="switchTab('news')" id="nav-news" class="nav-link">Новости</button>
            <button onclick="switchTab('profile')" id="nav-profile" class="nav-link hidden">Профиль</button>
            <div id="auth-zone">
                <button onclick="openModal()" class="bg-cyan-600 px-6 py-2 rounded-lg font-bold">Войти</button>
            </div>
        </div>
    </nav>

    <main class="p-10">
        <div id="tab-main" class="tab-content"><h2 class="text-4xl font-bold">Главная страница</h2></div>
        <div id="tab-news" class="tab-content hidden"><div id="news-container" class="grid gap-4"></div></div>
        
        <div id="tab-profile" class="tab-content hidden">
            <div id="management-panel" class="hidden bg-slate-900 p-6 rounded-xl border border-amber-500">
                <h3 class="text-amber-400 font-bold mb-4">Управление игроками</h3>
                <table class="w-full text-left">
                    <tbody id="users-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden">
        <div class="bg-slate-900 p-8 rounded-xl w-96">
            <form onsubmit="handleAuthLogin(event)" class="space-y-4">
                <input type="text" id="login-username" placeholder="Никнейм" class="w-full bg-slate-800 p-3 rounded" required>
                <input type="password" id="login-password" placeholder="Пароль" class="w-full bg-slate-800 p-3 rounded" required>
                <button type="submit" class="w-full bg-cyan-600 py-3 rounded font-bold">Войти</button>
            </form>
            <button onclick="closeModal()" class="mt-4 text-slate-400 w-full">Закрыть</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
