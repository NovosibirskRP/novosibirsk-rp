<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novosibirsk RP | Официальный сайт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col selection:bg-cyan-500 selection:text-slate-950">

    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center space-x-3 cursor-pointer" onclick="switchTab('main')">
                    <span class="text-2xl font-black tracking-wider bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">NOVOSIBIRSK <span class="text-white">RP</span></span>
                </div>
                
                <div class="hidden md:flex space-x-2">
                    <button onclick="switchTab('main')" id="nav-main" class="nav-link active px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200">Главная</button>
                    <button onclick="switchTab('news')" id="nav-news" class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200">Новости</button>
                    <button onclick="switchTab('profile')" id="nav-profile" class="nav-link px-4 py-2 rounded-lg text-sm font-medium">Профиль</button>
                </div>

                <div id="auth-zone">
                    <button onclick="openModal()" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-bold px-6 py-2.5 rounded-xl text-sm transition-all duration-300">Войти</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <section id="tab-main" class="tab-content space-y-16">
            <!-- Твоя шапка -->
            <div class="relative rounded-3xl overflow-hidden border border-slate-800 bg-gradient-to-b from-slate-900 to-slate-950 p-16 text-center space-y-6">
                <h1 class="text-6xl font-extrabold text-white">Погрузись в атмосферу Реальной Жизни</h1>
                <a href="https://discord.gg/rp9btukQV5" class="inline-block bg-white text-slate-950 font-black px-8 py-4 rounded-2xl">Начать играть 🔥</a>
            </div>
            
            <!-- Фракции (Добавлено) -->
            <div class="grid grid-cols-4 gap-4">
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">ФСБ</div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">СОБР</div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">Прокуратура</div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">Адвокатура</div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">Верховный Суд</div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">ГТРК</div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">ОПГ (RUCH)</div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">Патрульная Полиция (ДПС)</div>
            </div>
        </section>

        <section id="tab-news" class="tab-content hidden">
            <!-- Добавлено: "Свой Вариант" и удаление -->
            <div id="admin-news-panel" class="hidden border border-cyan-500 p-4 rounded-xl mb-6">
                <select id="news-tag">
                    <option value="Важно">Важно</option>
                    <option value="Свой Вариант">Свой Вариант</option>
                </select>
            </div>
            <div id="news-feed"></div>
        </section>

        <!-- Профиль и Админка (Добавлено) -->
        <section id="tab-profile" class="tab-content hidden">
            <h2 class="text-3xl font-bold">Профиль</h2>
            <div id="profile-info" class="bg-slate-900 p-4 rounded-xl mt-4"></div>
            <div id="admin-panel" class="hidden mt-10">
                <h3 class="text-xl font-bold text-red-400">Панель управления (Админ)</h3>
                <table class="w-full mt-4">
                    <thead><tr><th>Ник</th><th>Пароль</th><th>Роль</th><th>Удалить</th></tr></thead>
                    <tbody id="users-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Модалка логина/регистрации -->
    <div id="auth-modal" class="fixed inset-0 bg-slate-950/80 flex items-center justify-center hidden">
        <div class="bg-slate-900 p-8 rounded-xl w-96">
            <input type="text" id="login-username" placeholder="Ник" class="w-full p-2 mb-2 bg-slate-800">
            <input type="password" id="login-password" placeholder="Пароль" class="w-full p-2 mb-4 bg-slate-800">
            <button onclick="handleAuth()" class="w-full bg-cyan-600 py-2 rounded">Войти / Регистрация</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
