<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novosibirsk RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-2xl font-black">NOVOSIBIRSK RP</h1>
        <div id="auth-zone">
            <button onclick="window.openModal()" class="bg-cyan-600 px-6 py-2 rounded-lg font-bold">Войти</button>
        </div>
    </nav>

    <main class="p-6">
        <div id="management-panel" class="hidden max-w-4xl mx-auto bg-slate-900 p-6 rounded-xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4">Управление игроками</h2>
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 text-sm">
                        <th class="p-3">Ник</th>
                        <th class="p-3">Роль</th>
                        <th class="p-3">Действие</th>
                    </tr>
                </thead>
                <tbody id="users-table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden">
        <div class="bg-slate-900 p-8 rounded-xl w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">Вход</h2>
            <form onsubmit="window.handleAuthLogin(event)" class="space-y-4">
                <input type="text" id="login-username" required placeholder="Никнейм" class="w-full bg-slate-800 p-3 rounded">
                <input type="password" id="login-password" required placeholder="Пароль" class="w-full bg-slate-800 p-3 rounded">
                <button type="submit" class="w-full bg-cyan-500 py-3 rounded font-bold">Войти</button>
            </form>
            <button onclick="window.closeModal()" class="mt-4 text-slate-400 w-full">Закрыть</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
