<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novosibirsk RP | Официальный сайт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link.active { color: #22d3ee !important; background-color: #0f172a !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

    <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-20">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="switchTab('main')">
                <span class="text-2xl font-black text-white">NOVOSIBIRSK RP</span>
            </div>
            <div class="flex space-x-2">
                <button onclick="switchTab('main')" id="nav-main" class="nav-link active px-4 py-2 rounded-lg text-sm font-medium">Главная</button>
                <button onclick="switchTab('news')" id="nav-news" class="nav-link px-4 py-2 rounded-lg text-sm font-medium">Новости</button>
                <button onclick="switchTab('profile')" id="nav-profile" class="nav-link hidden px-4 py-2 rounded-lg text-sm font-medium">Профиль</button>
            </div>
            <div id="auth-zone">
                <button onclick="openModal()" class="bg-cyan-600 px-6 py-2 rounded-xl text-sm font-bold">Войти</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="tab-main" class="tab-content"><h1>Главная страница</h1></div>
        <div id="tab-news" class="tab-content hidden">
            <div id="admin-news-panel" class="hidden mb-6 bg-slate-900 p-6 rounded-2xl border border-cyan-500/30">
                <h3 class="text-lg font-bold mb-4">Опубликовать новость</h3>
                <input type="text" id="news-title" placeholder="Заголовок" class="w-full bg-slate-950 p-3 mb-2 rounded border">
                <textarea id="news-text" placeholder="Текст" class="w-full bg-slate-950 p-3 mb-2 rounded border"></textarea>
                <button onclick="createNews()" class="bg-cyan-500 px-6 py-2 rounded">Опубликовать</button>
            </div>
            <div id="news-feed" class="grid gap-6"></div>
        </div>
        
        <div id="tab-profile" class="tab-content hidden space-y-8">
            <div class="bg-slate-900 p-6 rounded-2xl">
                <h3 class="font-bold mb-4">Безопасность</h3>
                <input type="password" id="profile-new-password" placeholder="Новый пароль" class="bg-slate-950 p-2 rounded border">
                <button onclick="changeOwnPassword()" class="bg-blue-600 px-4 py-2 rounded ml-2">Обновить</button>
            </div>
            
            <div id="management-panel" class="hidden bg-slate-900 p-6 rounded-2xl border border-amber-500/30">
                <h3 class="text-amber-400 font-bold mb-4">База Данных Пользователей</h3>
                <table class="w-full text-sm">
                    <thead><tr class="text-left text-slate-400 uppercase"><th class="p-2">Ник</th><th class="p-2">Пароль</th><th class="p-2">Роль</th><th class="p-2">Действие</th></tr></thead>
                    <tbody id="users-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-slate-950/90 flex items-center justify-center hidden">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-sm relative">
            <button onclick="closeModal()" class="absolute top-4 right-4">✕</button>
            <form id="form-login" onsubmit="handleAuthLogin(event)" class="space-y-4">
                <input type="text" id="login-username" required placeholder="Никнейм" class="w-full bg-slate-950 p-3 rounded">
                <input type="password" id="login-password" required placeholder="Пароль" class="w-full bg-slate-950 p-3 rounded">
                <button type="submit" class="w-full bg-cyan-600 py-3 rounded font-bold">Войти</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
